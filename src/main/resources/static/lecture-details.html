<!doctype html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Детали лекции</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="/css/app.css">
</head>
<body>
<header class="app-topbar">
    <div class="app-topbar__inner">
        <a class="app-brand" href="/main.html">Student Testing</a>
        <div class="top-actions">
            <a id="lecturesBack" href="/lectures.html" class="btn btn-light">К списку лекций</a>
        </div>
    </div>
</header>

<main class="page">
    <div id="error" class="alert alert-error hidden"></div>

    <section id="lectureBox" class="panel hidden">
        <div class="page-header">
            <div>
                <h1 id="title" class="page-title">Детали лекции</h1>
                <p id="meta" class="page-subtitle"></p>
            </div>
        </div>

        <dl class="data-list">
            <dt>Описание</dt><dd id="description">-</dd>
        </dl>

        <div class="actions actions-large">
            <a id="back" class="btn" href="/lectures.html">Вернуться к списку лекций</a>
        </div>
    </section>

    <section class="panel">
        <h2 class="flush-top">Материалы лекции</h2>
        <div id="materialsBox" class="muted">Загрузка материалов...</div>
    </section>

    <section class="panel">
        <h2 class="flush-top">Тесты по лекции</h2>
        <div id="testsBox" class="muted">Загрузка тестов...</div>
    </section>
</main>

<script src="/js/api.js"></script>
<script>
    const api = StudentTestingApi.apiFetch;
    const html = StudentTestingApi.escapeHtml;
    const subjectId = StudentTestingApi.getQueryParam('subjectId');
    const lectureId = StudentTestingApi.getQueryParam('lectureId');

    function showError(message) {
      document.getElementById('error').textContent = message || 'Не удалось загрузить данные лекции.';
      document.getElementById('error').classList.remove('hidden');
    }

    function renderLectureMeta(lecture) {
      const parts = [];
      if (lecture.courseName) {
        parts.push(lecture.courseName);
      }
      if (Number(lecture.versionNumber) > 0) {
        parts.push(`версия ${lecture.versionNumber}`);
      }
      parts.push(`лекция ${lecture.ordinal}`);
      return parts.join(', ');
    }

    function renderLectureMaterials(materials) {
      const materialsBox = document.getElementById('materialsBox');
      if (!materials.length) {
        materialsBox.innerHTML = '<div class="alert alert-info">Для этой лекции пока нет прикрепленных материалов.</div>';
        return;
      }

      const materialsById = new Map(materials.map(material => [String(material.id), material]));
      materialsBox.innerHTML = `
        <ul class="list">
          ${materials.map(material => `
            <li class="list-row">
              <div>
                <strong>${html(material.fileName)}</strong>
                <div class="muted small">${html(material.contentType || 'Файл')}</div>
              </div>
              <button class="btn btn-light" type="button" data-download-material="${encodeURIComponent(material.id)}">Скачать</button>
            </li>
          `).join('')}
        </ul>`;

      materialsBox.querySelectorAll('[data-download-material]').forEach(button => {
        button.addEventListener('click', async () => {
          const material = materialsById.get(button.dataset.downloadMaterial);
          if (!material) {
            return;
          }

          button.disabled = true;
          try {
            await downloadLectureMaterial(material);
          } catch (error) {
            showError(error.message || 'Не удалось скачать файл.');
          } finally {
            button.disabled = false;
          }
        });
      });
    }

    async function downloadLectureMaterial(material) {
      if (!StudentTestingApi.requireAuth()) {
        return;
      }

      const token = StudentTestingApi.getToken();
      const response = await fetch(`/api/v1/public/learning/lectures/${encodeURIComponent(lectureId)}/materials/${encodeURIComponent(material.id)}/download`, {
        headers: token ? { Authorization: `Bearer ${token}` } : {}
      });

      if (!response.ok) {
        let message = `HTTP ${response.status}`;
        const contentType = response.headers.get('content-type') || '';
        if (contentType.includes('application/json')) {
          try {
            const payload = await response.json();
            message = payload?.message || payload?.detail || payload?.title || message;
          } catch (error) {
            // ignore JSON parsing error
          }
        } else {
          try {
            const text = await response.text();
            if (text) {
              message = text;
            }
          } catch (error) {
            // ignore text parsing error
          }
        }
        throw new Error(message);
      }

      const blob = await response.blob();
      const downloadUrl = URL.createObjectURL(blob);
      const link = document.createElement('a');
      link.href = downloadUrl;
      link.download = material.fileName || 'lecture-material';
      document.body.appendChild(link);
      link.click();
      link.remove();
      URL.revokeObjectURL(downloadUrl);
    }

    async function init() {
      if (!subjectId || !lectureId) {
        throw new Error('Не указаны параметры subjectId и lectureId.');
      }

      const backHref = `/lectures.html?subjectId=${encodeURIComponent(subjectId)}`;
      document.getElementById('back').href = backHref;
      document.getElementById('lecturesBack').href = backHref;

      const [lecture, tests, materials] = await Promise.all([
        api(`/public/learning/lectures/${encodeURIComponent(lectureId)}`),
        api(`/public/learning/lectures/${encodeURIComponent(lectureId)}/tests`),
        api(`/public/learning/lectures/${encodeURIComponent(lectureId)}/materials`)
      ]);

      document.getElementById('title').textContent = lecture.title || `Лекция #${lecture.id}`;
      document.getElementById('meta').textContent = renderLectureMeta(lecture);
      document.getElementById('description').textContent = lecture.description || '-';
      document.getElementById('lectureBox').classList.remove('hidden');
      renderLectureMaterials(materials);

      const testsBox = document.getElementById('testsBox');
      if (!tests.length) {
        testsBox.innerHTML = '<div class="alert alert-info">Для этой лекции пока нет опубликованных тестов.</div>';
        return;
      }

      testsBox.innerHTML = `
        <ul class="list">
          ${tests.map(test => `
            <li class="list-row">
              <div>
                <strong>${html(test.title || `Тест #${test.id}`)}</strong>
                <div class="muted small">${html(test.description || '')}</div>
                <div class="muted small">Вопросов: ${html(test.questionCount)}, попыток: ${html(test.attemptsAllowed)}</div>
                ${test.available ? '' : `<div class="muted small">${html(test.statusMessage || 'Тест пока недоступен студенту.')}</div>`}
              </div>
              ${test.available
                ? `<a class="btn btn-primary" href="/test.html?testId=${encodeURIComponent(test.id)}&assignmentId=${encodeURIComponent(test.assignmentId)}">Пройти тест</a>`
                : '<button class="btn btn-light" type="button" disabled>Недоступен</button>'}
            </li>
          `).join('')}
        </ul>`;
    }

    init().catch(error => showError(error.message));
</script>
</body>
</html>
