<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>О платформе</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link
            rel="stylesheet"
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand" href="/main.html">Student Testing</a>
        <div class="d-flex gap-2">
            <a class="btn btn-outline-light btn-sm" href="/main.html">Главная</a>
            <button id="logoutBtn" class="btn btn-light btn-sm d-none" type="button">Выйти</button>
            <a id="loginLink" class="btn btn-light btn-sm" href="/login.html">Войти</a>
        </div>
    </div>
</nav>

<div class="container mt-5">
    <div class="card shadow-sm">
        <div class="card-body p-4">
            <h1 class="mb-4">О платформе</h1>

            <p class="lead">
                Это платформа для тестирования студентов.
            </p>

            <p>Здесь вы можете:</p>
            <ul>
                <li>проходить тесты по различным предметам;</li>
                <li>просматривать результаты;</li>
                <li>работать с учебными материалами и личными данными через REST API.</li>
            </ul>

            <div class="mt-4 d-flex flex-wrap gap-2">
                <a href="/main.html" class="btn btn-primary">Вернуться на главную</a>
                <a href="/login.html" class="btn btn-outline-secondary">Страница входа</a>
            </div>
        </div>
    </div>
</div>

<script src="/js/api.js"></script>
<script>
    document.addEventListener("DOMContentLoaded", () => {
        const token = StudentTestingApi.getToken();
        const logoutBtn = document.getElementById("logoutBtn");
        const loginLink = document.getElementById("loginLink");

        if (token) {
            logoutBtn.classList.remove("d-none");
            loginLink.classList.add("d-none");
            logoutBtn.addEventListener("click", StudentTestingApi.logout);
        } else {
            logoutBtn.classList.add("d-none");
            loginLink.classList.remove("d-none");
        }
    });
</script>
</body>
</html>
