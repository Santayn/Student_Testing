<html lang="ru">

    <meta charset="UTF-8">
    <title>Роли пользователей</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="/css/app.css">
</head>
<body class="app-shell">
<aside class="sidebar">
    <h3>Меню</h3>
    <a href="/profile.html">О пользователе</a>
    <a href="/main.html">Главная</a>
    <a href="/subjects.html">Предметы</a>
    <a href="/about.html">О платформе</a>
    <a class="teacher-only" href="/manage_students.html">Управление студентами</a>
    <a class="teacher-only" href="/manage-teachers.html">Учебная нагрузка</a>
    <a class="teacher-only" href="/users.html">Управление ролями</a>
    <a class="teacher-only" href="/manage-teachers-subject.html">Преподаватели и предметы</a>
    <a class="teacher-only" href="/manage-lectures-subject.html">Лекции</a>
    <a class="teacher-only" href="/questions-page.html">Вопросы</a>
    <a class="teacher-only" href="/create-test.html">Создать тест</a>
    <a href="/result-list.html">Результаты тестов</a>
    <a class="teacher-only" href="/groups.html">Группы</a>
    <a class="teacher-only" href="/create-faculty.html">Факультеты</a>
    <a class="teacher-only" href="/manage-subject-faculty.html">Предметы факультетов</a>
    <a class="teacher-only" href="/create-subject.html">Создание предмета</a>
    <button type="button" id="logoutBtn" data-sidebar-logout>Выйти</button></aside>

<main class="content">
    <h1>Роли пользователей</h1>
    <div id="message"></div>

    <section class="panel">
        <label for="roleFilter">Фильтр по роли</label>
        <select id="roleFilter"></select>
    </section>

    <section class="panel">
        <table>
            <thead><tr><th>ID</th><th>Логин</th><th>Текущие роли</th><th>Новая роль</th><th></th></tr></thead>
            <tbody id="usersBody"></tbody>
        </table>
    </section>
</main>

<script src="/js/api.js"></script>
<script>
    const api = StudentTestingApi.apiFetch;
    const html = StudentTestingApi.escapeHtml;

    const state = {
      roles: [],
      users: []
    };

    const el = id => document.getElementById(id);

    function showMessage(type, message) {
      el('message').innerHTML = message ? `<div class="alert alert-${type}">${message}</div>` : '';
    }

    async function loadData() {
      const [roles, users] = await Promise.all([
        api('/roles'),
        api('/users')
      ]);
      state.roles = roles.sort((left, right) => String(left.name).localeCompare(String(right.name), 'ru'));
      state.users = users.sort((left, right) => String(left.login).localeCompare(String(right.login), 'ru'));
      renderFilter();
      renderUsers();
    }

    function renderFilter() {
      el('roleFilter').innerHTML = '<option value="">Все роли</option>' +
        state.roles.map(role => `<option value="${role.name}">${html(role.name)}</option>`).join('');
    }

    function renderUsers() {
      const filter = el('roleFilter').value;
      const users = filter
        ? state.users.filter(user => [...(user.roles || [])].includes(filter))
        : state.users;

      el('usersBody').innerHTML = users.map(user => {
        const roles = [...(user.roles || [])];
        const firstRole = roles[0] || '';
        const selectedRoleId = roleIdByName(firstRole);
        return `
          <tr>
            <td>${user.id}</td>
            <td>${html(user.login || '')}</td>
            <td>${roles.length ? roles.map(role => `<span class="badge">${html(role)}</span>`).join('') : '-'}</td>
            <td>
              <select data-user-role="${user.id}">
                ${state.roles.map(role => `<option value="${role.id}" ${role.id === selectedRoleId ? 'selected' : ''}>${html(role.name)}</option>`).join('')}
              </select>
            </td>
            <td><button type="button" onclick="applyRole(${user.id})">Сохранить</button></td>
          </tr>`;
      }).join('');
    }

    function roleIdByName(name) {
      return state.roles.find(role => role.name === name)?.id || null;
    }

    async function applyRole(userId) {
      const select = document.querySelector(`select[data-user-role="${userId}"]`);
      const roleId = Number(select.value);
      try {
        const updated = await api(`/users/${encodeURIComponent(userId)}/roles`, {
          method: 'PUT',
          body: JSON.stringify({ roleIds: [roleId] })
        });
        showMessage('success', `Роли пользователя ${html(updated.login)} обновлены.`);
        await loadData();
      } catch (error) {
        showMessage('error', html(error.message));
      }
    }

    el('roleFilter').addEventListener('change', renderUsers);

    if (StudentTestingApi.requireAuth()) {
      loadData().catch(error => showMessage('error', html(error.message)));
    }
</script>
</body>
</html>
