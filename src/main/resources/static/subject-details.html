<!doctype html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Карточка предмета</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="/css/app.css">
</head>
<body>
<header class="app-topbar">
    <div class="app-topbar__inner">
        <a class="app-brand" href="/main.html">Student Testing</a>
        <div class="top-actions">
            <a id="backTop" href="/subjects.html" class="btn btn-light">К предметам</a>
        </div>
    </div>
</header>

<main class="page page-narrow">
    <div id="error" class="alert alert-error hidden"></div>

    <section id="root" class="panel hidden">
        <div class="page-header">
            <div>
                <h1 id="title" class="page-title">Карточка предмета</h1>
                <p id="subtitle" class="page-subtitle">Краткая информация о предмете и доступные действия по вашей роли.</p>
            </div>
        </div>

        <dl class="data-list">
            <dt>ID</dt><dd id="subjectId">-</dd>
            <dt>Предмет</dt><dd id="subjectName">-</dd>
            <dt>Описание</dt><dd id="description">-</dd>
        </dl>

        <div class="actions actions-large">
            <a id="lecturesLink" class="btn btn-primary" href="/lectures.html">Лекции</a>
            <a id="topicsLink" class="btn hidden" href="/manage-topic-library.html">Тематики</a>
            <a id="backLink" class="btn" href="/subjects.html">Вернуться к списку</a>
        </div>
    </section>
</main>

<script src="/js/api.js"></script>
<script>
    const api = StudentTestingApi.apiFetch;
    const subjectId = StudentTestingApi.getQueryParam('subjectId');
    const facultyId = StudentTestingApi.getQueryParam('facultyId');

    function showError(message) {
      document.getElementById('error').textContent = message;
      document.getElementById('error').classList.remove('hidden');
    }

    async function init() {
      if (!subjectId) {
        throw new Error('Не указан параметр subjectId.');
      }

      const [user, subject] = await Promise.all([
        StudentTestingApi.loadCurrentUser(),
        api(`/subjects/${encodeURIComponent(subjectId)}`)
      ]);
      const roles = StudentTestingApi.normalizeRoleNames(user);
      const isTeacher = roles.some(role => role.includes('TEACHER') || role.includes('ADMIN'));
      const isStudent = roles.some(role => role.includes('STUDENT'));

      document.getElementById('title').textContent = subject.name || `Предмет #${subject.id}`;
      document.getElementById('subjectId').textContent = subject.id ?? '-';
      document.getElementById('subjectName').textContent = subject.name || '-';
      document.getElementById('description').textContent = subject.description || '-';

      const lecturesLink = document.getElementById('lecturesLink');
      const topicsLink = document.getElementById('topicsLink');
      const subtitle = document.getElementById('subtitle');

      if (isTeacher) {
        lecturesLink.href = `/manage-lectures-subject.html?subjectId=${encodeURIComponent(subject.id)}`;
        topicsLink.href = `/manage-topic-library.html?subjectId=${encodeURIComponent(subject.id)}`;
        topicsLink.classList.remove('hidden');
        subtitle.textContent = 'Управление лекциями и тематикой предмета.';
      } else if (isStudent) {
        lecturesLink.href = `/lectures.html?subjectId=${encodeURIComponent(subject.id)}`;
        topicsLink.classList.add('hidden');
        subtitle.textContent = 'Маршрут студента: предмет, лекции, тесты.';
      } else {
        lecturesLink.href = `/lectures.html?subjectId=${encodeURIComponent(subject.id)}`;
        topicsLink.classList.add('hidden');
      }

      const backHref = facultyId
        ? `/subjects.html?facultyId=${encodeURIComponent(facultyId)}`
        : '/subjects.html';
      document.getElementById('backLink').href = backHref;
      document.getElementById('backTop').href = backHref;
      document.getElementById('root').classList.remove('hidden');
    }

    if (StudentTestingApi.requireAuth()) {
      init().catch(error => showError(error.message || 'Не удалось загрузить страницу.'));
    }
</script>
</body>
</html>
