<!doctype html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Факультеты</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="/css/app.css">
</head>
<body class="app-shell">
<aside class="sidebar">
    <h3>Меню</h3>
    <a href="/profile.html">О пользователе</a>
    <a href="/main.html">Главная</a>
    <a href="/subjects.html">Предметы</a>
    <a href="/about.html">О платформе</a>
    <a class="teacher-only" href="/manage_students.html">Управление студентами</a>
    <a class="teacher-only" href="/manage-teachers.html">Учебная нагрузка</a>
    <a class="teacher-only" href="/users.html">Управление ролями</a>
    <a class="teacher-only" href="/manage-teachers-subject.html">Преподаватели и предметы</a>
    <a class="teacher-only" href="/manage-lectures-subject.html">Лекции</a>
    <a class="teacher-only" href="/questions-page.html">Вопросы</a>
    <a class="teacher-only" href="/create-test.html">Создать тест</a>
    <a href="/result-list.html">Результаты тестов</a>
    <a class="teacher-only" href="/groups.html">Группы</a>
    <a class="teacher-only" href="/create-faculty.html">Факультеты</a>
    <a class="teacher-only" href="/manage-subject-faculty.html">Предметы факультетов</a>
    <a class="teacher-only" href="/create-subject.html">Создание предмета</a>
    <button type="button" id="logoutBtn" data-sidebar-logout>Выйти</button></aside>

<main class="content">
    <h1>Факультеты</h1>
    <div id="message"></div>

    <section class="panel">
        <h2 id="formTitle">Новый факультет</h2>
        <form id="facultyForm">
            <div class="grid">
                <div>
                    <label for="nameInput">Название</label>
                    <input id="nameInput" required maxlength="200">
                </div>
                <div>
                    <label for="codeInput">Код</label>
                    <input id="codeInput" required maxlength="50">
                </div>
                <div>
                    <label for="descriptionInput">Описание</label>
                    <input id="descriptionInput" maxlength="1000">
                </div>
            </div>
            <div class="actions">
                <button id="saveBtn" class="btn-primary" type="submit">Сохранить</button>
                <button id="cancelBtn" class="btn-light hidden" type="button">Отмена</button>
            </div>
        </form>
    </section>

    <section class="panel">
        <table>
            <thead><tr><th>ID</th><th>Название</th><th>Код</th><th>Описание</th><th></th></tr></thead>
            <tbody id="facultiesBody"></tbody>
        </table>
    </section>
</main>

<script src="/js/api.js"></script>
<script>
    const api = StudentTestingApi.apiFetch;
    const html = StudentTestingApi.escapeHtml;

    const state = {
      faculties: [],
      editingId: null
    };

    const el = id => document.getElementById(id);

    function showMessage(type, message) {
      el('message').innerHTML = message ? `<div class="alert alert-${type}">${message}</div>` : '';
    }

    async function loadFaculties() {
      state.faculties = await api('/faculties');
      state.faculties.sort((left, right) => String(left.name).localeCompare(String(right.name), 'ru'));
      renderFaculties();
    }

    function renderFaculties() {
      el('facultiesBody').innerHTML = state.faculties.map(faculty => `
        <tr>
          <td>${faculty.id}</td>
          <td>${html(faculty.name || '')}</td>
          <td>${html(faculty.code || '')}</td>
          <td>${html(faculty.description || '')}</td>
          <td>
            <div class="actions actions-compact">
              <button class="btn-light" type="button" onclick="editFaculty(${faculty.id})">Изменить</button>
              <button class="btn-danger" type="button" onclick="deleteFaculty(${faculty.id})">Удалить</button>
            </div>
          </td>
        </tr>
      `).join('');
    }

    async function saveFaculty(event) {
      event.preventDefault();
      const body = {
        name: el('nameInput').value.trim(),
        code: el('codeInput').value.trim(),
        description: el('descriptionInput').value.trim() || null
      };

      try {
        if (state.editingId) {
          await api(`/faculties/${encodeURIComponent(state.editingId)}`, {
            method: 'PUT',
            body: JSON.stringify(body)
          });
          showMessage('success', 'Факультет обновлен.');
        } else {
          await api('/faculties', {
            method: 'POST',
            body: JSON.stringify(body)
          });
          showMessage('success', 'Факультет создан.');
        }
        clearForm();
        await loadFaculties();
      } catch (error) {
        showMessage('error', html(error.message));
      }
    }

    function editFaculty(id) {
      const faculty = state.faculties.find(item => item.id === id);
      if (!faculty) {
        return;
      }
      state.editingId = id;
      el('formTitle').textContent = 'Изменить факультет';
      el('nameInput').value = faculty.name || '';
      el('codeInput').value = faculty.code || '';
      el('descriptionInput').value = faculty.description || '';
      el('cancelBtn').classList.remove('hidden');
    }

    async function deleteFaculty(id) {
      const faculty = state.faculties.find(item => item.id === id);
      if (!faculty || !confirm(`Удалить факультет "${faculty.name}"?`)) {
        return;
      }
      try {
        await api(`/faculties/${encodeURIComponent(id)}`, { method: 'DELETE' });
        showMessage('success', 'Факультет удален.');
        await loadFaculties();
      } catch (error) {
        showMessage('error', html(error.message));
      }
    }

    function clearForm() {
      state.editingId = null;
      el('formTitle').textContent = 'Новый факультет';
      el('facultyForm').reset();
      el('cancelBtn').classList.add('hidden');
    }

    el('facultyForm').addEventListener('submit', saveFaculty);
    el('cancelBtn').addEventListener('click', clearForm);

    if (StudentTestingApi.requireAuth()) {
      loadFaculties().catch(error => showMessage('error', html(error.message)));
    }
</script>
</body>
</html>
