<!doctype html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Группы</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="/css/app.css">
</head>
<body class="app-shell">
<aside class="sidebar">
    <h3>Меню</h3>
    <a href="/profile.html">О пользователе</a>
    <a href="/main.html">Главная</a>
    <a href="/subjects.html">Предметы</a>
    <a href="/about.html">О платформе</a>
    <a class="teacher-only" href="/manage_students.html">Управление студентами</a>
    <a class="teacher-only" href="/manage-teachers.html">Учебная нагрузка</a>
    <a class="teacher-only" href="/users.html">Управление ролями</a>
    <a class="teacher-only" href="/manage-teachers-subject.html">Преподаватели и предметы</a>
    <a class="teacher-only" href="/manage-lectures-subject.html">Лекции</a>
    <a class="teacher-only" href="/questions-page.html">Вопросы</a>
    <a class="teacher-only" href="/create-test.html">Создать тест</a>
    <a href="/result-list.html">Результаты тестов</a>
    <a class="teacher-only" href="/groups.html">Группы</a>
    <a class="teacher-only" href="/create-faculty.html">Факультеты</a>
    <a class="teacher-only" href="/manage-subject-faculty.html">Предметы факультетов</a>
    <a class="teacher-only" href="/create-subject.html">Создание предмета</a>
    <button type="button" id="logoutBtn" data-sidebar-logout>Выйти</button></aside>

<main class="content">
    <h1>Группы</h1>
    <div id="message"></div>

    <section class="panel">
        <h2 id="formTitle">Новая группа</h2>
        <form id="groupForm">
            <div class="grid">
                <div>
                    <label for="nameInput">Название</label>
                    <input id="nameInput" required maxlength="200">
                </div>
                <div>
                    <label for="codeInput">Код</label>
                    <input id="codeInput" required maxlength="50">
                </div>
                <div>
                    <label for="facultySelect">Факультет</label>
                    <select id="facultySelect" required></select>
                </div>
            </div>
            <div class="actions">
                <button id="saveBtn" class="btn-primary" type="submit">Сохранить</button>
                <button id="cancelBtn" class="btn-light hidden" type="button">Отмена</button>
            </div>
        </form>
    </section>

    <section class="panel">
        <table>
            <thead><tr><th>ID</th><th>Название</th><th>Код</th><th>Факультет</th><th></th></tr></thead>
            <tbody id="groupsBody"></tbody>
        </table>
    </section>
</main>

<script src="/js/api.js"></script>
<script>
    const api = StudentTestingApi.apiFetch;
    const html = StudentTestingApi.escapeHtml;

    const state = {
      groups: [],
      faculties: [],
      editingId: null
    };

    const el = id => document.getElementById(id);

    function showMessage(type, message) {
      el('message').innerHTML = message ? `<div class="alert alert-${type}">${message}</div>` : '';
    }

    function facultyName(id) {
      const faculty = state.faculties.find(item => Number(item.id) === Number(id));
      return faculty ? `${faculty.name} (${faculty.code})` : `#${id}`;
    }

    async function loadData() {
      const [faculties, groups] = await Promise.all([
        api('/faculties'),
        api('/groups')
      ]);
      state.faculties = faculties.sort((left, right) => String(left.name).localeCompare(String(right.name), 'ru'));
      state.groups = groups.sort((left, right) => String(left.name).localeCompare(String(right.name), 'ru'));
      renderFaculties();
      renderGroups();
    }

    function renderFaculties() {
      el('facultySelect').innerHTML = '<option value="">Выберите факультет</option>' +
        state.faculties.map(faculty => `<option value="${faculty.id}">${html(faculty.name)} (${html(faculty.code)})</option>`).join('');
    }

    function renderGroups() {
      el('groupsBody').innerHTML = state.groups.map(group => `
        <tr>
          <td>${group.id}</td>
          <td><a href="/group-details.html?id=${encodeURIComponent(group.id)}">${html(group.name || '')}</a></td>
          <td>${html(group.code || '')}</td>
          <td>${html(facultyName(group.facultyId))}</td>
          <td>
            <div class="actions actions-compact">
              <button class="btn-light" type="button" onclick="editGroup(${group.id})">Изменить</button>
              <button class="btn-danger" type="button" onclick="deleteGroup(${group.id})">Удалить</button>
            </div>
          </td>
        </tr>
      `).join('');
    }

    async function saveGroup(event) {
      event.preventDefault();
      const body = {
        name: el('nameInput').value.trim(),
        code: el('codeInput').value.trim(),
        facultyId: Number(el('facultySelect').value)
      };

      try {
        if (state.editingId) {
          await api(`/groups/${encodeURIComponent(state.editingId)}`, {
            method: 'PUT',
            body: JSON.stringify(body)
          });
          showMessage('success', 'Группа обновлена.');
        } else {
          await api('/groups', {
            method: 'POST',
            body: JSON.stringify(body)
          });
          showMessage('success', 'Группа создана.');
        }
        clearForm();
        await loadData();
      } catch (error) {
        showMessage('error', html(error.message));
      }
    }

    function editGroup(id) {
      const group = state.groups.find(item => item.id === id);
      if (!group) {
        return;
      }
      state.editingId = id;
      el('formTitle').textContent = 'Изменить группу';
      el('nameInput').value = group.name || '';
      el('codeInput').value = group.code || '';
      el('facultySelect').value = String(group.facultyId || '');
      el('cancelBtn').classList.remove('hidden');
    }

    async function deleteGroup(id) {
      const group = state.groups.find(item => item.id === id);
      if (!group || !confirm(`Удалить группу "${group.name}"?`)) {
        return;
      }
      try {
        await api(`/groups/${encodeURIComponent(id)}`, { method: 'DELETE' });
        showMessage('success', 'Группа удалена.');
        await loadData();
      } catch (error) {
        showMessage('error', html(error.message));
      }
    }

    function clearForm() {
      state.editingId = null;
      el('formTitle').textContent = 'Новая группа';
      el('groupForm').reset();
      el('cancelBtn').classList.add('hidden');
    }

    el('groupForm').addEventListener('submit', saveGroup);
    el('cancelBtn').addEventListener('click', clearForm);

    if (StudentTestingApi.requireAuth()) {
      loadData().catch(error => showMessage('error', html(error.message)));
    }
</script>
</body>
</html>
