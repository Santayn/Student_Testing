<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Регистрация</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link
            rel="stylesheet"
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-12 col-md-7 col-lg-6">
            <div class="card shadow-sm">
                <div class="card-body p-4">
                    <h1 class="h3 mb-4 text-center">Регистрация</h1>

                    <div id="errorBox" class="alert alert-danger d-none" role="alert"></div>

                    <form id="registerForm" novalidate>
                        <div class="mb-3">
                            <label for="login" class="form-label">Логин</label>
                            <input type="text" class="form-control" id="login" required>
                        </div>

                        <div class="mb-3">
                            <label for="password" class="form-label">Пароль</label>
                            <input type="password" class="form-control" id="password" required>
                        </div>

                        <div class="mb-3">
                            <label for="firstName" class="form-label">Имя</label>
                            <input type="text" class="form-control" id="firstName">
                        </div>

                        <div class="mb-3">
                            <label for="lastName" class="form-label">Фамилия</label>
                            <input type="text" class="form-control" id="lastName">
                        </div>

                        <div class="mb-3">
                            <label for="phoneNumber" class="form-label">Телефон</label>
                            <input type="text" class="form-control" id="phoneNumber">
                        </div>

                        <button id="submitBtn" type="submit" class="btn btn-primary w-100">
                            Зарегистрироваться
                        </button>
                    </form>

                    <div class="mt-3 text-center">
                        <a href="/login.html">Вход</a>
                    </div>

                    <div class="mt-2 text-center">
                        <a href="/about.html">О платформе</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="/js/api.js"></script>
<script>
    document.addEventListener("DOMContentLoaded", () => {
        if (StudentTestingApi.getToken()) {
            StudentTestingApi.redirectAfterLogin("/main.html");
            return;
        }

        const form = document.getElementById("registerForm");
        const errorBox = document.getElementById("errorBox");
        const submitBtn = document.getElementById("submitBtn");

        form.addEventListener("submit", async (event) => {
            event.preventDefault();

            errorBox.classList.add("d-none");
            errorBox.textContent = "";
            submitBtn.disabled = true;

            const payload = {
                login: document.getElementById("login").value.trim(),
                password: document.getElementById("password").value,
                firstName: document.getElementById("firstName").value.trim(),
                lastName: document.getElementById("lastName").value.trim(),
                phoneNumber: document.getElementById("phoneNumber").value.trim()
            };

            try {
                await StudentTestingApi.register(payload);
                StudentTestingApi.redirectAfterLogin("/main.html");
            } catch (error) {
                errorBox.textContent = error.message || "Не удалось зарегистрироваться";
                errorBox.classList.remove("d-none");
            } finally {
                submitBtn.disabled = false;
            }
        });
    });
</script>
</body>
</html>
