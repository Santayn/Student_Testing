<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Регистрация</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="/css/app.css">
</head>
<body>
<main class="auth-page">
    <section class="panel auth-card auth-card--wide">
        <div class="page-header">
            <div>
                <h1 class="page-title">Регистрация</h1>
                <p class="page-subtitle">Создайте учетную запись. При необходимости укажите идентификатор существующей персоны.</p>
            </div>
        </div>

        <div id="errorBox" class="alert alert-danger hidden" role="alert"></div>

        <form id="registerForm" class="form-grid" novalidate>
            <div class="field">
                <label for="login">Логин</label>
                <input type="text" id="login" autocomplete="username" required>
            </div>

            <div class="field">
                <label for="password">Пароль</label>
                <input type="password" id="password" autocomplete="new-password" required>
            </div>

            <div class="field">
                <label for="personId">ID персоны</label>
                <input type="number" id="personId" min="1">
            </div>

            <button id="submitBtn" type="submit" class="btn-primary btn-block">Зарегистрироваться</button>
        </form>

        <div class="actions actions-center">
            <a href="/login.html">Вход</a>
            <a href="/about.html">О платформе</a>
        </div>
    </section>
</main>

<script src="/js/api.js"></script>
<script>
    document.addEventListener("DOMContentLoaded", () => {
        if (StudentTestingApi.getToken()) {
            StudentTestingApi.redirectAfterLogin("/main.html");
            return;
        }

        const form = document.getElementById("registerForm");
        const errorBox = document.getElementById("errorBox");
        const submitBtn = document.getElementById("submitBtn");

        form.addEventListener("submit", async (event) => {
            event.preventDefault();

            errorBox.classList.add("hidden");
            errorBox.textContent = "";
            submitBtn.disabled = true;

            const personId = document.getElementById("personId").value.trim();
            const payload = {
                login: document.getElementById("login").value.trim(),
                password: document.getElementById("password").value
            };
            if (personId) {
                payload.personId = Number(personId);
            }

            try {
                await StudentTestingApi.register(payload);
                StudentTestingApi.redirectAfterLogin("/main.html");
            } catch (error) {
                errorBox.textContent = error.message || "Не удалось зарегистрироваться";
                errorBox.classList.remove("hidden");
            } finally {
                submitBtn.disabled = false;
            }
        });
    });
</script>
</body>
</html>
