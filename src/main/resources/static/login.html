<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Вход</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="/css/app.css">
</head>
<body>
<main class="auth-page">
    <section class="panel auth-card">
        <div class="page-header">
            <div>
                <h1 class="page-title">Вход</h1>
                <p class="page-subtitle">Введите логин и пароль, чтобы открыть доступ к платформе.</p>
            </div>
        </div>

        <div id="errorBox" class="alert alert-danger hidden" role="alert"></div>

        <form id="loginForm" class="form-grid" novalidate>
            <div class="field">
                <label for="login">Логин</label>
                <input type="text" id="login" name="login" autocomplete="username" required>
            </div>

            <div class="field">
                <label for="password">Пароль</label>
                <input type="password" id="password" name="password" autocomplete="current-password" required>
            </div>

            <button id="submitBtn" type="submit" class="btn-primary btn-block">Войти</button>
        </form>

        <div class="actions actions-center">
            <a href="/register.html">Регистрация</a>
            <a href="/about.html">О платформе</a>
        </div>
    </section>
</main>

<script src="/js/api.js"></script>
<script>
    document.addEventListener("DOMContentLoaded", () => {
        if (StudentTestingApi.getToken()) {
            StudentTestingApi.redirectAfterLogin("/main.html");
            return;
        }

        const form = document.getElementById("loginForm");
        const errorBox = document.getElementById("errorBox");
        const submitBtn = document.getElementById("submitBtn");

        form.addEventListener("submit", async (event) => {
            event.preventDefault();

            errorBox.classList.add("hidden");
            errorBox.textContent = "";
            submitBtn.disabled = true;

            const login = document.getElementById("login").value.trim();
            const password = document.getElementById("password").value;

            try {
                await StudentTestingApi.login(login, password);
                StudentTestingApi.redirectAfterLogin("/main.html");
            } catch (error) {
                errorBox.textContent = error.message || "Неверный логин или пароль";
                errorBox.classList.remove("hidden");
            } finally {
                submitBtn.disabled = false;
            }
        });
    });
</script>
</body>
</html>
