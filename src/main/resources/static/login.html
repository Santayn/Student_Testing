<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Вход</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link
            rel="stylesheet"
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-12 col-md-6 col-lg-5">
            <div class="card shadow-sm">
                <div class="card-body p-4">
                    <h1 class="h3 mb-4 text-center">Вход</h1>

                    <div id="errorBox" class="alert alert-danger d-none" role="alert"></div>

                    <form id="loginForm" novalidate>
                        <div class="mb-3">
                            <label for="login" class="form-label">Логин</label>
                            <input type="text" class="form-control" id="login" name="login" required>
                        </div>

                        <div class="mb-3">
                            <label for="password" class="form-label">Пароль</label>
                            <input type="password" class="form-control" id="password" name="password" required>
                        </div>

                        <button id="submitBtn" type="submit" class="btn btn-primary w-100">
                            Войти
                        </button>
                    </form>

                    <div class="mt-3 text-center">
                        <a href="/register.html">Регистрация</a>
                    </div>

                    <div class="mt-2 text-center">
                        <a href="/about.html">О платформе</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="/js/api.js"></script>
<script>
    document.addEventListener("DOMContentLoaded", () => {
        if (StudentTestingApi.getToken()) {
            StudentTestingApi.redirectAfterLogin("/main.html");
            return;
        }

        const form = document.getElementById("loginForm");
        const errorBox = document.getElementById("errorBox");
        const submitBtn = document.getElementById("submitBtn");

        form.addEventListener("submit", async (event) => {
            event.preventDefault();

            errorBox.classList.add("d-none");
            errorBox.textContent = "";
            submitBtn.disabled = true;

            const login = document.getElementById("login").value.trim();
            const password = document.getElementById("password").value;

            try {
                await StudentTestingApi.login(login, password);
                StudentTestingApi.redirectAfterLogin("/main.html");
            } catch (error) {
                errorBox.textContent = error.message || "Неверный логин или пароль";
                errorBox.classList.remove("d-none");
            } finally {
                submitBtn.disabled = false;
            }
        });
    });
</script>
</body>
</html>
