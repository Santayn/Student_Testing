<!doctype html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Лекции</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="/css/app.css">
</head>
<body>
<header class="app-topbar">
    <div class="app-topbar__inner">
        <a class="app-brand" href="/main.html">Student Testing</a>
        <div class="top-actions">
            <a href="/subjects.html" class="btn btn-light">К предметам</a>
        </div>
    </div>
</header>

<main class="page">
    <div class="page-header">
        <div>
            <h1 class="page-title">Лекции</h1>
            <p id="meta" class="page-subtitle">Загрузка данных...</p>
        </div>
    </div>

    <div id="error" class="alert alert-error hidden"></div>

    <section class="panel">
        <ul id="list" class="list"></ul>
    </section>
</main>

<script src="/js/api.js"></script>
<script>
    const api = StudentTestingApi.apiFetch;
    const html = StudentTestingApi.escapeHtml;
    const subjectId = StudentTestingApi.getQueryParam('subjectId');

    function showError(message) {
      document.getElementById('error').textContent = message || 'Не удалось загрузить список лекций.';
      document.getElementById('error').classList.remove('hidden');
    }

    async function init() {
      if (!subjectId) {
        throw new Error('Не указан параметр subjectId.');
      }

      const [subject, lectures] = await Promise.all([
        api(`/public/learning/subjects/${encodeURIComponent(subjectId)}`),
        api(`/public/learning/subjects/${encodeURIComponent(subjectId)}/lectures`)
      ]);

      document.getElementById('meta').textContent = `${subject.name || `Предмет #${subject.id}`}. Лекций: ${lectures.length}`;
      const list = document.getElementById('list');
      if (!lectures.length) {
        list.innerHTML = '<li class="list-row muted">Для этого предмета пока нет доступных лекций.</li>';
        return;
      }

      list.innerHTML = lectures.map(lecture => `
        <li class="list-row">
          <div>
            <a href="/lecture-details.html?subjectId=${encodeURIComponent(subjectId)}&lectureId=${encodeURIComponent(lecture.id)}">
              <strong>${html(lecture.ordinal)}. ${html(lecture.title || `Лекция #${lecture.id}`)}</strong>
            </a>
            <div class="muted small">${html(lecture.courseName || '')}, версия ${html(lecture.versionNumber)}</div>
          </div>
          <span class="muted small">ID: ${html(lecture.id)}</span>
        </li>
      `).join('');
    }

    init().catch(error => showError(error.message));
</script>
</body>
</html>
