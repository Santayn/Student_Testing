<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Главная страница</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="/css/app.css">
</head>
<body>
<header class="app-topbar">
    <div class="app-topbar__inner">
        <a class="app-brand" href="/main.html">Student Testing</a>
        <div class="top-actions">
            <span id="userBadge" class="small"></span>
            <button id="logoutBtn" type="button" class="btn-light">Выйти</button>
        </div>
    </div>
</header>

<main class="page">
    <div id="errorBox" class="alert alert-danger hidden"></div>

    <section class="panel">
        <div class="page-header">
            <div>
                <h1 class="page-title">Добро пожаловать на платформу тестирования студентов</h1>
                <p class="page-subtitle">Здесь собраны предметы, тесты, профили пользователей и основные рабочие разделы платформы.</p>
            </div>
        </div>

        <dl class="data-list">
            <dt>Текущий пользователь</dt>
            <dd><strong id="currentUserName">Загрузка...</strong></dd>
            <dt>Роль</dt>
            <dd><strong id="currentUserRole">-</strong></dd>
        </dl>
    </section>

    <section class="panel panel-flat">
        <div class="actions">
            <a href="/subjects.html" class="btn btn-primary">Предметы</a>
            <a href="/profile.html" class="btn">Личный кабинет</a>
            <a href="/students.html" class="btn">Студенты группы</a>
            <a href="/result-list.html" class="btn">Результаты тестов</a>
            <a href="/about.html" class="btn">О платформе</a>
        </div>
    </section>
</main>

<script src="/js/api.js"></script>
<script>
    document.addEventListener("DOMContentLoaded", async () => {
        if (!StudentTestingApi.requireAuth()) {
            return;
        }

        document.getElementById("logoutBtn").addEventListener("click", StudentTestingApi.logout);

        const errorBox = document.getElementById("errorBox");
        const currentUserName = document.getElementById("currentUserName");
        const currentUserRole = document.getElementById("currentUserRole");
        const userBadge = document.getElementById("userBadge");

        try {
            const user = await StudentTestingApi.loadCurrentUser();

            const roles = Array.isArray(user.roles) ? user.roles : [];
            const person = user.person || {};
            const personName = [person.firstName, person.lastName].filter(Boolean).join(" ").trim();
            const displayName = user.fullName || personName || user.login || "Пользователь";
            const roleText = roles.length ? roles.join(", ") : "-";

            currentUserName.textContent = displayName;
            currentUserRole.textContent = roleText;
            userBadge.textContent = `${displayName} (${roleText})`;
        } catch (error) {
            errorBox.textContent = error.message || "Не удалось загрузить данные пользователя";
            errorBox.classList.remove("hidden");
            currentUserName.textContent = "Ошибка";
            currentUserRole.textContent = "Ошибка";
        }
    });
</script>
</body>
</html>
