<!doctype html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Мои предметы</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="/css/app.css">
</head>
<body>
<header class="app-topbar">
    <div class="app-topbar__inner">
        <a class="app-brand" href="/main.html">Student Testing</a>
        <div class="top-actions">
            <a href="/main.html" class="btn btn-light">Главная</a>
            <a href="/profile.html" class="btn btn-light">Личный кабинет</a>
        </div>
    </div>
</header>

<main class="page">
    <div class="page-header">
        <div>
            <h1 class="page-title">Мои предметы</h1>
            <p class="page-subtitle">Для студентов отображаются предметы по текущей группе, для преподавателей и администраторов — доступные дисциплины.</p>
        </div>
    </div>

    <div id="meta" class="panel panel-flat muted">Загрузка данных...</div>
    <div id="err" class="alert alert-error hidden"></div>

    <section class="panel">
        <div class="field">
            <label for="filter">Поиск по предметам</label>
            <input id="filter" type="search" placeholder="Введите название предмета">
        </div>
    </section>

    <section class="panel">
        <div id="summary" class="muted hidden"></div>
        <ul id="subjects" class="list"></ul>
    </section>
</main>

<script src="/js/api.js"></script>
<script>
    const api = StudentTestingApi.apiFetch;
    const SUBJECT_ROLE_TEACHER = 1;
    const GROUP_ROLE_STUDENT = 1;

    const el = id => document.getElementById(id);
    let facultyId = null;
    let subjects = [];

    function showError(message) {
      el('err').textContent = message || 'Не удалось загрузить список предметов.';
      el('err').classList.remove('hidden');
    }

    function hideError() {
      el('err').classList.add('hidden');
      el('err').textContent = '';
    }

    function unique(values) {
      return [...new Set(values.filter(value => value !== null && value !== undefined))];
    }

    function renderList(items) {
      const list = el('subjects');
      list.innerHTML = '';
      if (!items.length) {
        list.innerHTML = '<li class="list-row muted">Подходящие предметы не найдены.</li>';
        el('summary').classList.add('hidden');
        return;
      }

      list.innerHTML = items.map(subject => {
        const params = new URLSearchParams();
        if (facultyId) {
          params.set('facultyId', facultyId);
        }
        params.set('subjectId', subject.id);
        return `
          <li class="list-row">
            <a href="/subject-details.html?${params.toString()}"><strong>${StudentTestingApi.escapeHtml(subject.name || `Предмет #${subject.id}`)}</strong></a>
            <span class="muted small">ID: ${StudentTestingApi.escapeHtml(subject.id)}</span>
          </li>`;
      }).join('');

      el('summary').textContent = `Найдено предметов: ${items.length}`;
      el('summary').classList.remove('hidden');
    }

    function applyFilter() {
      const query = (el('filter').value || '').trim().toLowerCase();
      renderList(query ? subjects.filter(subject => (subject.name || '').toLowerCase().includes(query)) : subjects);
    }

    async function teacherSubjects(personId, includeAllForAdmin) {
      if (!personId && includeAllForAdmin) {
        return api('/subjects');
      }
      const memberships = await api(`/memberships/subjects?personId=${encodeURIComponent(personId)}&activeOnly=true`);
      const ids = unique(memberships.filter(item => Number(item.role) === SUBJECT_ROLE_TEACHER).map(item => item.subjectId));
      return Promise.all(ids.map(id => api(`/subjects/${encodeURIComponent(id)}`)));
    }

    async function studentContext(personId) {
      const memberships = await api(`/memberships/groups?personId=${encodeURIComponent(personId)}&activeOnly=true`);
      const groupMembership = memberships.find(item => Number(item.role) === GROUP_ROLE_STUDENT);
      if (!groupMembership) {
        return { group: null, faculty: null, subjects: [] };
      }

      const group = await api(`/groups/${encodeURIComponent(groupMembership.groupId)}`);
      const faculty = group.facultyId ? await api(`/faculties/${encodeURIComponent(group.facultyId)}`) : null;

      const [enrollments, groupAssignments] = await Promise.all([
        api(`/teaching/enrollments?groupMembershipId=${encodeURIComponent(groupMembership.id)}`),
        api(`/teaching/assignments?groupId=${encodeURIComponent(group.id)}`)
      ]);
      const enrolledAssignments = await Promise.all(
        unique(enrollments.map(item => item.teachingAssignmentId)).map(id => api(`/teaching/assignments/${encodeURIComponent(id)}`))
      );
      const assignments = [...new Map(
        [...groupAssignments, ...enrolledAssignments]
          .filter(item => item && item.id !== null && item.id !== undefined)
          .map(item => [item.id, item])
      ).values()];

      const subjectMemberships = await Promise.all(
        unique(assignments.map(item => item.subjectMembershipId)).map(id => api(`/memberships/subjects/memberships/${encodeURIComponent(id)}`))
      );
      const loadedSubjects = await Promise.all(
        unique(subjectMemberships.map(item => item.subjectId)).map(id => api(`/subjects/${encodeURIComponent(id)}`))
      );

      return { group, faculty, subjects: loadedSubjects };
    }

    async function init() {
      const me = await api('/users/me');
      const roles = Array.isArray(me.roles) ? me.roles : [...(me.roles || [])];
      const roleName = roles.join(' ').toUpperCase();
      const isTeacher = roleName.includes('TEACHER') || roleName.includes('ADMIN');
      const isStudent = roleName.includes('STUDENT');

      if (isStudent) {
        const context = await studentContext(me.personId);
        facultyId = context.faculty?.id || null;
        subjects = context.subjects;
        el('meta').textContent = context.group
          ? `Группа: ${context.group.name || context.group.code || context.group.id}, факультет: ${context.faculty?.name || context.faculty?.id || '-'}`
          : 'Для текущего пользователя не найдена активная учебная группа.';
      } else if (isTeacher) {
        subjects = await teacherSubjects(me.personId, roleName.includes('ADMIN'));
        el('meta').textContent = 'Показаны предметы, доступные преподавателю или администратору.';
      } else {
        subjects = [];
        el('meta').textContent = 'Для вашей роли доступных предметов не найдено.';
      }

      hideError();
      renderList(subjects.sort((left, right) => String(left.name).localeCompare(String(right.name), 'ru')));
    }

    el('filter').addEventListener('input', applyFilter);

    if (StudentTestingApi.requireAuth()) {
      init().catch(error => showError(error.message || 'Не удалось загрузить список предметов.'));
    }
</script>
</body>
</html>
