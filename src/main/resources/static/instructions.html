<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Инструкция</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="/css/app.css">
</head>
<body>
<header class="app-topbar">
    <div class="app-topbar__inner">
        <a class="app-brand" href="/main.html">Student Testing</a>
        <div class="top-actions">
            <span id="userBadge" class="small"></span>
            <button id="logoutBtn" type="button" class="btn-light">Выйти</button>
        </div>
    </div>
</header>

<main class="page">
    <div id="errorBox" class="alert alert-danger hidden"></div>

    <section class="panel">
        <div class="page-header">
            <div>
                <h1 class="page-title">Инструкция</h1>
                <p class="page-subtitle">Краткая памятка по навигации, ролям и основным действиям в системе.</p>
            </div>
        </div>
        <p id="instructionNote" class="muted">Разделы ниже переключаются по роли. При включенном preview открывается выбранный сценарий без авторизации.</p>
    </section>

    <section class="panel">
        <div class="actions" id="roleTabs"></div>
        <div id="instructionContent" class="instruction-content"></div>
    </section>
</main>

<script>
    (() => {
        const params = new URLSearchParams(window.location.search);
        const previewRoleValue = (params.get("previewRole") || "").toUpperCase().trim();
        if (!previewRoleValue) {
            return;
        }

        const previewRoles = previewRoleValue
            .split(",")
            .map(role => role.trim())
            .filter(Boolean);

        if (!previewRoles.length) {
            return;
        }

        const previewName = params.get("previewName") || "Preview User";
        const [firstName, ...lastNameParts] = previewName.split(" ").filter(Boolean);
        window.__studentTestingPreviewMode = true;
        window.__studentTestingPreviewToken = "preview-token";
        window.__studentTestingPreviewUser = {
            login: previewName.toLowerCase().replace(/\s+/g, "."),
            roles: previewRoles,
            person: {
                firstName: firstName || "Preview",
                lastName: lastNameParts.join(" ") || "User"
            }
        };
    })();
</script>
<script src="/js/api.js"></script>

    const INSTRUCTION_SECTIONS = {

                {

                    purpose: "Создание и редактирование факультетов.",
                    steps: [

                    expected: "Новый факультет появляется в списке и доступен в связанных справочниках.",

                    steps: [
                        "Выберите факультет.",
                        "Добавьте свободные предметы или удалите лишние.",
                        "Обновите список после изменений."
                    ],
                    expected: "Список связанных предметов синхронизирован с выбранным факультетом.",
                    troubleshooting: "Если предметы не применяются, проверьте ответ эндпоинтов `faculty-subjects`."
                },
                {
                    tab: "Нагрузка",
                    href: "/manage-teacher-groups.html",
                    purpose: "Работа с шаблонами нагрузки и привязками преподавателей к группам.",
                    steps: [
                        "Выберите факультет, курс и семестр.",
                        "Сформируйте список предметов и преподавателей.",
                        "Примените шаблон к нужным группам."
                    ],
                    expected: "После применения создаются или обновляются назначения по выбранным группам.",
                    troubleshooting: "Если часть назначений пропускается, проверьте конфликты с существующими записями."
                }
            ]

    };

    const ROLE_ORDER = ["STUDENT", "TEACHER", "ADMIN"];
    let activeSection = "common";

    function normalizeRoleName(value) {
        return String(value || "").toUpperCase();
    }

    function resolveDefaultSection(user) {
        const roles = (user && Array.isArray(user.roles) ? user.roles : []).map(normalizeRoleName);
        if (roles.some(role => role.includes("ADMIN"))) return "admin";
        if (roles.some(role => role.includes("TEACHER"))) return "teacher";
        if (roles.some(role => role.includes("STUDENT"))) return "student";
        return "common";
    }

    function roleLabel(key) {
        switch (key) {
            case "student": return "Студент";
            case "teacher": return "Преподаватель";
            case "admin": return "Администратор";
            default: return "Общее";
        }
    }

    function renderTabs() {
        const tabs = document.getElementById("roleTabs");
        const order = ["common", "student", "teacher", "admin"];
        tabs.innerHTML = order.map(key => `
            <button type="button" class="${key === activeSection ? 'btn btn-primary' : 'btn'}" data-role-tab="${key}">
                ${roleLabel(key)}
            </button>
        `).join("");

        tabs.querySelectorAll("[data-role-tab]").forEach(button => {
            button.addEventListener("click", () => {
                activeSection = button.dataset.roleTab;
                renderTabs();
                renderSection();
            });
        });
    }

    function imageMarkup(sectionKey, index) {
        const roleImages = ROLE_IMAGES[sectionKey];
        if (!roleImages) {
            return "";
        }
        const imageConfig = index % 2 === 0 ? roleImages.menu : roleImages.filled;
        if (!imageConfig) {
            return "";
        }
        return `
            <figure class="panel panel-flat panel-gap-sm">
                <img src="${imageConfig.src}" alt="${imageConfig.alt}">
                <figcaption class="muted small">${imageConfig.caption}</figcaption>
            </figure>
        `;
    }

    function renderSection() {
        const root = document.getElementById("instructionContent");
        const section = INSTRUCTION_SECTIONS[activeSection];
        root.innerHTML = `
            <section class="panel panel-flat">
                <h2 class="flush-top">${section.title}</h2>
                <p class="muted">${section.description}</p>
            </section>
            ${section.items.map((item, index) => `
                <section class="panel panel-gap">
                    <div class="page-header page-header-compact">
                        <div>
                            <h3 class="flush-top">${item.tab}</h3>
                            <p class="muted">${item.purpose}</p>
                        </div>
                        <a class="btn btn-light" href="${item.href}">Открыть раздел</a>
                    </div>
                    ${imageMarkup(activeSection, index)}
                    <div class="grid">
                        <div>
                            <h4>Как открыть</h4>
                            <ul class="list list-spaced">
                                ${item.steps.map(step => `<li class="list-row">${step}</li>`).join("")}
                            </ul>
                        </div>
                        <div>
                            <h4>Ожидаемый результат</h4>
                            <p class="muted">${item.expected}</p>
                            <h4>Если что-то не работает</h4>
                            <p class="muted">${item.troubleshooting}</p>
                        </div>
                    </div>
                </section>
            `).join("")}
        `;
    }

    async function init() {
        document.getElementById("logoutBtn").addEventListener("click", StudentTestingApi.logout);
        const errorBox = document.getElementById("errorBox");
        const userBadge = document.getElementById("userBadge");

        try {
            let user = StudentTestingApi.getCurrentUserFromStorage?.() || null;
            if (!window.__studentTestingPreviewMode) {
                user = await StudentTestingApi.loadCurrentUser();
            } else {
                user = window.__studentTestingPreviewUser;
            }

            const person = user?.person || {};
            const displayName = user?.fullName
                || [person.firstName, person.lastName].filter(Boolean).join(" ").trim()
                || user?.login
                || "Пользователь";
            const roles = Array.isArray(user?.roles) ? user.roles.map(normalizeRoleName) : [];
            const roleText = roles.length ? roles.join(", ") : "COMMON";
            userBadge.textContent = `${displayName} (${roleText})`;
            activeSection = resolveDefaultSection(user);
        } catch (error) {
            errorBox.textContent = error.message || "Не удалось загрузить инструкцию для текущего пользователя.";
            errorBox.classList.remove("hidden");
            activeSection = "common";
        }

        renderTabs();
        renderSection();
    }

    init();
</script>
</body>
</html>
