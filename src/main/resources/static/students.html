<!doctype html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Студенты группы</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="/css/app.css">
</head>
<body>
<header class="app-topbar">
    <div class="app-topbar__inner">
        <a class="app-brand" href="/main.html">Student Testing</a>
        <div class="top-actions">
            <a href="/main.html" class="btn btn-light">Главная</a>
            <a href="/kubstuTest/manage-students" class="btn btn-light">Расширенное управление</a>
            <button id="logoutBtn" type="button" class="btn-light">Выйти</button>
        </div>
    </div>
</header>

<main class="page">
    <div id="errorBox" class="alert alert-error hidden"></div>

    <section class="panel">
        <div class="page-header">
            <div>
                <h1 class="page-title">Студенты группы</h1>
                <p class="page-subtitle">Выберите группу и просмотрите студентов, закрепленных за ней через GroupMembership.</p>
            </div>
        </div>

        <div class="field">
            <label for="groupSelect">Группа</label>
            <select id="groupSelect">
                <option value="">Выберите группу...</option>
            </select>
        </div>
    </section>

    <section class="panel">
        <div id="emptyBox" class="alert alert-info hidden">В выбранной группе пока нет активных студентов.</div>
        <div id="studentsTableWrap" class="table-wrap hidden">
            <table>
                <thead><tr><th>Студент</th><th>Email</th><th>Membership</th><th></th></tr></thead>
                <tbody id="studentsBody"></tbody>
            </table>
        </div>
    </section>
</main>

<script src="/js/api.js"></script>
<script>
    const api = StudentTestingApi.apiFetch;
    const html = StudentTestingApi.escapeHtml;
    const STUDENT_ROLE = 1;

    const state = {
      groups: [],
      people: []
    };

    const el = id => document.getElementById(id);

    function personName(person) {
      const fullName = [person.lastName, person.firstName].filter(Boolean).join(' ').trim();
      return fullName || person.email || `Person #${person.id}`;
    }

    function personById(id) {
      return state.people.find(person => Number(person.id) === Number(id));
    }

    function showError(message) {
      el('errorBox').textContent = message || '';
      el('errorBox').classList.toggle('hidden', !message);
    }

    async function init() {
      await StudentTestingApi.loadCurrentUser();
      document.getElementById('logoutBtn').addEventListener('click', StudentTestingApi.logout);

      const [groups, people] = await Promise.all([
        api('/groups'),
        api('/users/people')
      ]);
      state.groups = groups.sort((left, right) => String(left.name).localeCompare(String(right.name), 'ru'));
      state.people = people;
      renderGroups();

      const initialGroupId = StudentTestingApi.getQueryParam('groupId');
      if (initialGroupId && state.groups.some(group => String(group.id) === initialGroupId)) {
        el('groupSelect').value = initialGroupId;
        await loadStudents();
      }
    }

    function renderGroups() {
      el('groupSelect').innerHTML = state.groups.length
        ? '<option value="">Выберите группу</option>' +
          state.groups.map(group => `<option value="${group.id}">${html(group.name || group.code || `Группа #${group.id}`)}</option>`).join('')
        : '<option value="">Нет доступных групп</option>';
      el('groupSelect').disabled = !state.groups.length;
    }

    async function loadStudents() {
      showError('');
      el('emptyBox').classList.add('hidden');
      el('studentsTableWrap').classList.add('hidden');
      el('studentsBody').innerHTML = '';

      const groupId = el('groupSelect').value;
      if (!groupId) {
        return;
      }

      try {
        const memberships = await api(`/memberships/groups?groupId=${encodeURIComponent(groupId)}&activeOnly=true`);
        const students = memberships
          .filter(membership => Number(membership.role) === STUDENT_ROLE)
          .map(membership => ({ membership, person: personById(membership.personId) }))
          .filter(item => item.person)
          .sort((left, right) => personName(left.person).localeCompare(personName(right.person), 'ru'));

        if (!students.length) {
          el('emptyBox').classList.remove('hidden');
          return;
        }

        el('studentsBody').innerHTML = students.map(item => `
          <tr>
            <td>${html(personName(item.person))}</td>
            <td>${html(item.person.email || '')}</td>
            <td>#${item.membership.id}</td>
            <td>
              <a class="btn"
                 href="/student-details.html?groupId=${encodeURIComponent(groupId)}&studentId=${encodeURIComponent(item.person.id)}">
                Подробнее
              </a>
            </td>
          </tr>
        `).join('');
        el('studentsTableWrap').classList.remove('hidden');
      } catch (error) {
        showError(error.message || 'Не удалось загрузить список студентов.');
      }
    }

    el('groupSelect').addEventListener('change', () => loadStudents());

    if (StudentTestingApi.requireAuth()) {
      init().catch(error => {
        el('groupSelect').innerHTML = '<option value="">Не удалось загрузить группы</option>';
        showError(error.message);
      });
    }
</script>
</body>
</html>
