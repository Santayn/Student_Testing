<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Список студентов</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link
            rel="stylesheet"
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand" href="/main.html">Student Testing</a>
        <div class="d-flex gap-2">
            <a class="btn btn-outline-light btn-sm" href="/main.html">Главная</a>
            <button id="logoutBtn" type="button" class="btn btn-light btn-sm">Выйти</button>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <div id="errorBox" class="alert alert-danger d-none"></div>

    <div class="card shadow-sm mb-4">
        <div class="card-body">
            <h1 class="h3 mb-3">Список студентов</h1>

            <div class="row g-3 align-items-end">
                <div class="col-12 col-md-4">
                    <label for="groupIdInput" class="form-label">ID группы</label>
                    <input type="number" class="form-control" id="groupIdInput" min="1">
                </div>
                <div class="col-12 col-md-auto">
                    <button id="loadBtn" type="button" class="btn btn-primary">Загрузить</button>
                </div>
            </div>

            <p class="mt-3 mb-0">
                Текущая группа:
                <strong id="groupIdLabel">—</strong>
            </p>
        </div>
    </div>

    <div class="card shadow-sm">
        <div class="card-body">
            <div id="emptyBox" class="alert alert-info d-none mb-3">
                В этой группе нет студентов.
            </div>

            <ul id="studentsList" class="list-group"></ul>
        </div>
    </div>
</div>

<script src="/js/api.js"></script>
<script>
    document.addEventListener("DOMContentLoaded", async () => {
        if (!StudentTestingApi.requireAuth()) {
            return;
        }

        document.getElementById("logoutBtn").addEventListener("click", StudentTestingApi.logout);

        const errorBox = document.getElementById("errorBox");
        const emptyBox = document.getElementById("emptyBox");
        const studentsList = document.getElementById("studentsList");
        const groupIdInput = document.getElementById("groupIdInput");
        const groupIdLabel = document.getElementById("groupIdLabel");
        const loadBtn = document.getElementById("loadBtn");

        async function loadStudents(groupId) {
            errorBox.classList.add("d-none");
            emptyBox.classList.add("d-none");
            studentsList.innerHTML = "";

            if (!groupId) {
                groupIdLabel.textContent = "—";
                return;
            }

            groupIdLabel.textContent = groupId;
            groupIdInput.value = groupId;

            try {
                const students = await StudentTestingApi.apiFetch(`/group-students/${groupId}`);

                if (!Array.isArray(students) || students.length === 0) {
                    emptyBox.classList.remove("d-none");
                    return;
                }

                students.forEach(student => {
                    const studentName = StudentTestingApi.studentDisplayName(student);
                    const li = document.createElement("li");
                    li.className = "list-group-item d-flex justify-content-between align-items-center";

                    li.innerHTML = `
                        <span>${StudentTestingApi.escapeHtml(studentName)}</span>
                        <a class="btn btn-sm btn-outline-primary"
                           href="/student-details.html?groupId=${encodeURIComponent(groupId)}&studentId=${encodeURIComponent(student.id)}">
                            Открыть
                        </a>
                    `;

                    studentsList.appendChild(li);
                });
            } catch (error) {
                errorBox.textContent = error.message || "Не удалось загрузить студентов";
                errorBox.classList.remove("d-none");
            }
        }

        loadBtn.addEventListener("click", async () => {
            const groupId = groupIdInput.value.trim();
            if (!groupId) {
                return;
            }
            await loadStudents(groupId);
        });

        const initialGroupId = StudentTestingApi.getQueryParam("groupId");
        if (initialGroupId) {
            await loadStudents(initialGroupId);
        }
    });
</script>
</body>
</html>
