<!doctype html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Предметы факультетов</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="/css/app.css">
</head>
<body class="app-shell">
<aside class="sidebar"></aside>

<main class="content">
    <div class="page-header">
        <div>
            <h1 class="page-title">Предметы факультетов</h1>
            <p class="page-subtitle">Привязывайте предметы к факультетам через актуальный API и поддерживайте список без устаревших связей.</p>
        </div>
    </div>

    <div id="message" class="message"></div>

    <section class="panel">
        <div class="grid">
            <div class="field">
                <label for="facultySelect">Факультет</label>
                <select id="facultySelect" disabled>
                    <option value="">Загрузка...</option>
                </select>
            </div>
        </div>
    </section>

    <div class="layout">
        <section>
            <div class="panel">
                <div class="row">
                    <h2>Доступные предметы</h2>
                    <span id="availableCount" class="badge">0</span>
                </div>
                <p class="muted">Показываются предметы, которые еще не привязаны к выбранному факультету.</p>
                <select id="availableSubjects" multiple size="14" disabled></select>
                <div class="actions">
                    <button id="addSubjectsBtn" class="btn" type="button" disabled>Добавить выбранные</button>
                </div>
            </div>
        </section>

        <section>
            <div class="panel">
                <div class="row">
                    <h2>Предметы факультета</h2>
                    <span id="assignedCount" class="badge">0</span>
                </div>
                <p class="muted">Эти предметы уже доступны для выбранного факультета.</p>
                <select id="assignedSubjects" multiple size="14" disabled></select>
                <div class="actions">
                    <button id="removeSubjectsBtn" class="btn btn-danger" type="button" disabled>Убрать выбранные</button>
                </div>
            </div>
        </section>
    </div>
</main>

<script src="/js/api.js"></script>
<script>
    const api = StudentTestingApi.apiFetch;
    const html = StudentTestingApi.escapeHtml;

    const state = {
      faculties: [],
      subjects: [],
      assignedSubjects: []
    };

    const el = id => document.getElementById(id);

    function showMessage(type, message) {
      el('message').innerHTML = message ? `<div class="alert alert-${type}">${message}</div>` : '';
    }

    function selectedFacultyId() {
      return el('facultySelect').value ? Number(el('facultySelect').value) : null;
    }

    function selectedOptionValues(selectId) {
      return [...el(selectId).selectedOptions].map(option => Number(option.value)).filter(Boolean);
    }

    function sortByName(items) {
      return items.slice().sort((left, right) => String(left.name || '').localeCompare(String(right.name || ''), 'ru'));
    }

    function setActionState(disabled) {
      el('availableSubjects').disabled = disabled;
      el('assignedSubjects').disabled = disabled;
      el('addSubjectsBtn').disabled = disabled;
      el('removeSubjectsBtn').disabled = disabled;
    }

    function renderFacultySelect() {
      const select = el('facultySelect');
      if (!state.faculties.length) {
        select.innerHTML = '<option value="">Нет доступных факультетов</option>';
        select.disabled = true;
        setActionState(true);
        return;
      }

      select.innerHTML = '<option value="">Выберите факультет</option>' +
        sortByName(state.faculties)
          .map(faculty => `<option value="${faculty.id}">${html(faculty.name)}</option>`)
          .join('');
      select.disabled = false;
    }

    function renderSubjectLists() {
      const facultyId = selectedFacultyId();
      if (!facultyId) {
        el('availableSubjects').innerHTML = '';
        el('assignedSubjects').innerHTML = '';
        el('availableCount').textContent = '0';
        el('assignedCount').textContent = '0';
        setActionState(true);
        return;
      }

      const assignedIds = new Set(state.assignedSubjects.map(subject => Number(subject.id)));
      const available = sortByName(state.subjects.filter(subject => !assignedIds.has(Number(subject.id))));
      const assigned = sortByName(state.assignedSubjects);

      el('availableSubjects').innerHTML = available
        .map(subject => `<option value="${subject.id}">${html(subject.name)}</option>`)
        .join('');
      el('assignedSubjects').innerHTML = assigned
        .map(subject => `<option value="${subject.id}">${html(subject.name)}</option>`)
        .join('');

      el('availableCount').textContent = String(available.length);
      el('assignedCount').textContent = String(assigned.length);

      el('availableSubjects').disabled = false;
      el('assignedSubjects').disabled = false;
      el('addSubjectsBtn').disabled = available.length === 0;
      el('removeSubjectsBtn').disabled = assigned.length === 0;
    }

    async function loadAssignedSubjects() {
      const facultyId = selectedFacultyId();
      if (!facultyId) {
        state.assignedSubjects = [];
        renderSubjectLists();
        return;
      }

      state.assignedSubjects = await api(`/faculties/${encodeURIComponent(facultyId)}/subjects`);
      renderSubjectLists();
    }

    async function addSubjects() {
      const facultyId = selectedFacultyId();
      const subjectIds = selectedOptionValues('availableSubjects');
      if (!facultyId || !subjectIds.length) {
        showMessage('error', 'Выберите факультет и хотя бы один предмет.');
        return;
      }

      el('addSubjectsBtn').disabled = true;
      try {
        await Promise.all(subjectIds.map(subjectId => api(
          `/faculties/${encodeURIComponent(facultyId)}/subjects/${encodeURIComponent(subjectId)}`,
          { method: 'POST' }
        )));
        showMessage('success', `Добавлено предметов: ${subjectIds.length}.`);
        await loadAssignedSubjects();
      } catch (error) {
        showMessage('error', html(error.message));
      } finally {
        renderSubjectLists();
      }
    }

    async function removeSubjects() {
      const facultyId = selectedFacultyId();
      const subjectIds = selectedOptionValues('assignedSubjects');
      if (!facultyId || !subjectIds.length) {
        showMessage('error', 'Выберите факультет и хотя бы один предмет для удаления.');
        return;
      }

      el('removeSubjectsBtn').disabled = true;
      try {
        await Promise.all(subjectIds.map(subjectId => api(
          `/faculties/${encodeURIComponent(facultyId)}/subjects/${encodeURIComponent(subjectId)}`,
          { method: 'DELETE' }
        )));
        showMessage('success', `Удалено предметов: ${subjectIds.length}.`);
        await loadAssignedSubjects();
      } catch (error) {
        showMessage('error', html(error.message));
      } finally {
        renderSubjectLists();
      }
    }

    async function init() {
      await StudentTestingApi.loadCurrentUser();
      const [faculties, subjects] = await Promise.all([
        api('/faculties'),
        api('/subjects')
      ]);
      state.faculties = faculties;
      state.subjects = subjects;
      renderFacultySelect();
      renderSubjectLists();

      if (!state.faculties.length) {
        showMessage('info', 'В системе пока нет факультетов.');
      } else if (!state.subjects.length) {
        showMessage('info', 'В системе пока нет предметов для привязки.');
      }
    }

    el('facultySelect').addEventListener('change', () => {
      showMessage('', '');
      loadAssignedSubjects().catch(error => showMessage('error', html(error.message)));
    });
    el('addSubjectsBtn').addEventListener('click', addSubjects);
    el('removeSubjectsBtn').addEventListener('click', removeSubjects);

    renderFacultySelect();
    renderSubjectLists();

    if (StudentTestingApi.requireAuth()) {
      init().catch(error => {
        el('facultySelect').innerHTML = '<option value="">Факультет недоступен</option>';
        showMessage('error', html(error.message));
      });
    }
</script>
</body>
</html>
