<!doctype html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Предметы</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="/css/app.css">
</head>
<body class="app-shell">
<aside class="sidebar">
    <h3>Меню</h3>
    <a href="/profile.html">О пользователе</a>
    <a href="/main.html">Главная</a>
    <a href="/subjects.html">Предметы</a>
    <a href="/about.html">О платформе</a>
    <a class="teacher-only" href="/manage_students.html">Управление студентами</a>
    <a class="teacher-only" href="/manage-teachers.html">Учебная нагрузка</a>
    <a class="teacher-only" href="/users.html">Управление ролями</a>
    <a class="teacher-only" href="/manage-teachers-subject.html">Преподаватели и предметы</a>
    <a class="teacher-only" href="/manage-lectures-subject.html">Лекции</a>
    <a class="teacher-only" href="/questions-page.html">Вопросы</a>
    <a class="teacher-only" href="/create-test.html">Создать тест</a>
    <a href="/result-list.html">Результаты тестов</a>
    <a class="teacher-only" href="/groups.html">Группы</a>
    <a class="teacher-only" href="/create-faculty.html">Факультеты</a>
    <a class="teacher-only" href="/manage-subject-faculty.html">Предметы факультетов</a>
    <a class="teacher-only" href="/create-subject.html">Создание предмета</a>
    <button type="button" id="logoutBtn" data-sidebar-logout>Выйти</button></aside>

<main class="content">
    <h1>Предметы</h1>
    <div id="message"></div>

    <section class="panel">
        <h2 id="formTitle">Новый предмет</h2>
        <form id="subjectForm">
            <div class="grid-two">
                <div>
                    <label for="nameInput">Название</label>
                    <input id="nameInput" required maxlength="200">
                </div>
                <div>
                    <label for="descriptionInput">Описание</label>
                    <input id="descriptionInput" maxlength="1000">
                </div>
            </div>
            <div class="actions">
                <button id="saveBtn" class="btn-primary" type="submit">Сохранить</button>
                <button id="cancelBtn" class="btn-light hidden" type="button">Отмена</button>
            </div>
        </form>
    </section>

    <section class="panel">
        <table>
            <thead><tr><th>ID</th><th>Название</th><th>Описание</th><th></th></tr></thead>
            <tbody id="subjectsBody"></tbody>
        </table>
    </section>
</main>

<script src="/js/api.js"></script>
<script>
    const api = StudentTestingApi.apiFetch;
    const html = StudentTestingApi.escapeHtml;

    const state = {
      subjects: [],
      editingId: null
    };

    const el = id => document.getElementById(id);

    function showMessage(type, message) {
      el('message').innerHTML = message ? `<div class="alert alert-${type}">${message}</div>` : '';
    }

    async function loadSubjects() {
      state.subjects = await api('/subjects');
      state.subjects.sort((left, right) => String(left.name).localeCompare(String(right.name), 'ru'));
      renderSubjects();
    }

    function renderSubjects() {
      el('subjectsBody').innerHTML = state.subjects.map(subject => `
        <tr>
          <td>${subject.id}</td>
          <td><a href="/subject-details.html?subjectId=${encodeURIComponent(subject.id)}">${html(subject.name || '')}</a></td>
          <td>${html(subject.description || '')}</td>
          <td>
            <div class="actions actions-compact">
              <button class="btn-light" type="button" onclick="editSubject(${subject.id})">Изменить</button>
              <button class="btn-danger" type="button" onclick="deleteSubject(${subject.id})">Удалить</button>
            </div>
          </td>
        </tr>
      `).join('');
    }

    async function saveSubject(event) {
      event.preventDefault();
      const body = {
        name: el('nameInput').value.trim(),
        description: el('descriptionInput').value.trim() || null
      };

      try {
        if (state.editingId) {
          await api(`/subjects/${encodeURIComponent(state.editingId)}`, {
            method: 'PUT',
            body: JSON.stringify(body)
          });
          showMessage('success', 'Предмет обновлен.');
        } else {
          await api('/subjects', {
            method: 'POST',
            body: JSON.stringify(body)
          });
          showMessage('success', 'Предмет создан.');
        }
        clearForm();
        await loadSubjects();
      } catch (error) {
        showMessage('error', html(error.message));
      }
    }

    function editSubject(id) {
      const subject = state.subjects.find(item => item.id === id);
      if (!subject) {
        return;
      }
      state.editingId = id;
      el('formTitle').textContent = 'Изменить предмет';
      el('nameInput').value = subject.name || '';
      el('descriptionInput').value = subject.description || '';
      el('cancelBtn').classList.remove('hidden');
    }

    async function deleteSubject(id) {
      const subject = state.subjects.find(item => item.id === id);
      if (!subject || !confirm(`Удалить предмет "${subject.name}"?`)) {
        return;
      }
      try {
        await api(`/subjects/${encodeURIComponent(id)}`, { method: 'DELETE' });
        showMessage('success', 'Предмет удален.');
        await loadSubjects();
      } catch (error) {
        showMessage('error', html(error.message));
      }
    }

    function clearForm() {
      state.editingId = null;
      el('formTitle').textContent = 'Новый предмет';
      el('subjectForm').reset();
      el('cancelBtn').classList.add('hidden');
    }

    el('subjectForm').addEventListener('submit', saveSubject);
    el('cancelBtn').addEventListener('click', clearForm);

    if (StudentTestingApi.requireAuth()) {
      loadSubjects().catch(error => showMessage('error', html(error.message)));
    }
</script>
</body>
</html>
