<!doctype html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Шаблоны курса</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="/css/app.css">
</head>
<body class="app-shell">
<aside class="sidebar"></aside>

<main class="content">
    <h1>Шаблоны курса</h1>
    <div id="message" class="message"></div>

    <div class="layout">
        <section>
            <div class="panel">
                <div class="row">
                    <h2>Контекст предмета</h2>
                    <a id="manageTopicLibraryLink" class="button-link btn-light" href="/manage-topic-library.html">Тематики</a>
                </div>

                <label for="subjectSelect">Предмет преподавателя</label>
                <select id="subjectSelect">
                    <option value="">Загрузка...</option>
                </select>

                <div class="muted">
                    Шаблоны и версии связывают предмет, лекции и тесты. Сначала выберите предмет, затем создайте шаблон курса и его версии.
                </div>
            </div>

            <div class="panel">
                <h2 id="templateFormTitle">Новый шаблон</h2>
                <label for="templateName">Название</label>
                <input id="templateName" type="text" maxlength="200" placeholder="Например: Базовый поток">

                <label class="check">
                    <input id="templatePublic" type="checkbox" checked>
                    Публиковать шаблон
                </label>

                <div class="actions">
                    <button id="saveTemplateBtn" class="btn" type="button" disabled>Сохранить</button>
                    <button id="cancelTemplateBtn" class="btn-secondary hidden" type="button">Отмена</button>
                </div>
            </div>

            <div class="panel">
                <h2 id="versionFormTitle">Новая версия</h2>
                <div class="grid">
                    <div>
                        <label for="versionNumber">Номер версии</label>
                        <input id="versionNumber" type="number" min="1" value="1">
                    </div>
                    <div>
                        <label for="versionTitle">Название</label>
                        <input id="versionTitle" type="text" maxlength="200">
                    </div>
                </div>

                <label for="versionDescription">Описание</label>
                <textarea id="versionDescription" maxlength="2000"></textarea>

                <label for="versionNotes">Примечания к изменениям</label>
                <textarea id="versionNotes" maxlength="2000"></textarea>

                <label id="versionPublishedLabel" class="check">
                    <input id="versionPublished" type="checkbox">
                    Опубликовать версию
                </label>

                <div class="actions">
                    <button id="saveVersionBtn" class="btn" type="button" disabled>Сохранить версию</button>
                    <button id="cancelVersionBtn" class="btn-secondary hidden" type="button">Отмена</button>
                </div>
            </div>
        </section>

        <section>
            <div class="panel">
                <div class="row">
                    <h2>Шаблоны курса</h2>
                    <span id="templateCount" class="badge">0</span>
                </div>
                <div id="templateList" class="empty">Шаблоны не выбраны.</div>
            </div>

            <div class="panel">
                <div class="row">
                    <h2>Версии выбранного шаблона</h2>
                    <span id="versionCount" class="badge">0</span>
                </div>
                <div id="versionList" class="empty">Версии не выбраны.</div>
            </div>
        </section>
    </div>
</main>

<script src="/js/api.js"></script>
<script>
    const api = StudentTestingApi.apiFetch;
    const html = StudentTestingApi.escapeHtml;
    const TEACHER_ROLE = 1;

    const state = {
      user: null,
      subjectMemberships: [],
      subjects: [],
      templates: [],
      versions: [],
      selectedTemplateId: null,
      editingTemplateId: null,
      editingVersionId: null
    };

    const initialFilters = {
      subjectId: StudentTestingApi.getQueryParam('subjectId'),
      subjectMembershipId: StudentTestingApi.getQueryParam('subjectMembershipId'),
      templateId: StudentTestingApi.getQueryParam('templateId')
    };

    const el = id => document.getElementById(id);

    function selectedSubjectId() {
      return el('subjectSelect').value ? Number(el('subjectSelect').value) : null;
    }

    function selectedSubjectMembership() {
      const subjectId = selectedSubjectId();
      if (!subjectId) {
        return null;
      }
      return state.subjectMemberships.find(item => Number(item.subjectId) === subjectId) || null;
    }

    function showMessage(type, message) {
      el('message').innerHTML = message ? `<div class="alert alert-${type}">${message}</div>` : '';
    }

    function unique(values) {
      return [...new Set(values.filter(value => value !== null && value !== undefined))];
    }

    function setLoading(button, loading) {
      button.disabled = loading;
      button.dataset.loading = loading ? 'true' : 'false';
    }

    function resolveInitialSelection(items, requestedId) {
      if (requestedId && items.some(item => String(item.id) === String(requestedId))) {
        return String(requestedId);
      }
      if (items.length === 1) {
        return String(items[0].id);
      }
      return '';
    }

    function buildLecturesHref(versionId) {
      const params = new URLSearchParams();
      const subjectId = selectedSubjectId();
      const membership = selectedSubjectMembership();
      if (subjectId) {
        params.set('subjectId', String(subjectId));
      }
      if (membership) {
        params.set('subjectMembershipId', String(membership.id));
      }
      if (state.selectedTemplateId) {
        params.set('templateId', String(state.selectedTemplateId));
      }
      if (versionId) {
        params.set('versionId', String(versionId));
      }
      return `/manage-lectures-subject.html?${params.toString()}`;
    }

    function buildTopicLibraryHref() {
      const params = new URLSearchParams();
      const subjectId = selectedSubjectId();
      const membership = selectedSubjectMembership();
      if (subjectId) {
        params.set('subjectId', String(subjectId));
      }
      if (membership) {
        params.set('subjectMembershipId', String(membership.id));
      }
      const query = params.toString();
      return query ? `/manage-topic-library.html?${query}` : '/manage-topic-library.html';
    }

    function updateContextLinks() {
      el('manageTopicLibraryLink').href = buildTopicLibraryHref();
    }

    async function loadTeacherSubjects() {
      state.user = await StudentTestingApi.loadCurrentUser();
      if (!state.user.personId) {
        throw new Error('Не удалось определить преподавателя по текущему профилю.');
      }

      const memberships = await api(`/memberships/subjects?personId=${encodeURIComponent(state.user.personId)}&activeOnly=true`);
      state.subjectMemberships = memberships
        .filter(item => Number(item.role) === TEACHER_ROLE)
        .sort((left, right) => Number(left.id) - Number(right.id));

      const subjectIds = unique(state.subjectMemberships.map(item => item.subjectId));
      state.subjects = await Promise.all(subjectIds.map(id => api(`/subjects/${encodeURIComponent(id)}`)));

      const select = el('subjectSelect');
      if (!state.subjects.length) {
        select.innerHTML = '<option value="">Нет доступных предметов</option>';
        select.disabled = true;
        showMessage('info', 'Нет предметов преподавателя для работы с шаблонами курса.');
        updateContextLinks();
        return;
      }

      select.disabled = false;
      select.innerHTML = '<option value="">Выберите предмет</option>' +
        state.subjects
          .sort((left, right) => String(left.name).localeCompare(String(right.name), 'ru'))
          .map(subject => `<option value="${subject.id}">${html(subject.name)}</option>`)
          .join('');

      const preferredMembership = initialFilters.subjectMembershipId
        ? state.subjectMemberships.find(item => String(item.id) === String(initialFilters.subjectMembershipId))
        : null;
      const selectedId = preferredMembership
        ? String(preferredMembership.subjectId)
        : resolveInitialSelection(state.subjects, initialFilters.subjectId);

      if (selectedId) {
        select.value = selectedId;
        await loadTemplates();
      } else {
        updateContextLinks();
      }
    }

    async function loadTemplates() {
      clearTemplateForm();
      resetTemplateSelection();
      updateContextLinks();

      const subjectId = selectedSubjectId();
      el('saveTemplateBtn').disabled = !subjectId;
      if (!subjectId) {
        state.templates = [];
        renderTemplates();
        return;
      }

      state.templates = await api(
        `/courses/templates?subjectId=${encodeURIComponent(subjectId)}&authorPersonId=${encodeURIComponent(state.user.personId)}`
      );
      renderTemplates();

      const selectedId = resolveInitialSelection(state.templates, initialFilters.templateId);
      if (selectedId) {
        await loadVersions(Number(selectedId));
      }
    }

    async function loadVersions(templateId) {
      state.selectedTemplateId = templateId;
      clearVersionForm();
      if (!templateId) {
        state.versions = [];
        renderVersions();
        return;
      }

      state.versions = await api(`/courses/templates/${encodeURIComponent(templateId)}/versions`);
      prepareVersionDefaults();
      renderTemplates();
      renderVersions();
      el('saveVersionBtn').disabled = false;
    }

    function renderTemplates() {
      el('templateCount').textContent = state.templates.length;
      if (!selectedSubjectId()) {
        el('templateList').className = 'empty';
        el('templateList').innerHTML = 'Шаблоны не выбраны.';
        return;
      }
      if (!state.templates.length) {
        el('templateList').className = 'empty';
        el('templateList').innerHTML = 'У выбранного предмета пока нет шаблонов курса.';
        return;
      }

      el('templateList').className = '';
      el('templateList').innerHTML = `
        <table>
          <thead>
            <tr>
              <th>Название</th>
              <th>Статус</th>
              <th></th>
            </tr>
          </thead>
          <tbody>
            ${state.templates.map(template => `
              <tr>
                <td>
                  <div><b>${html(template.name)}</b></div>
                  <div class="muted">ID ${template.id}</div>
                </td>
                <td>
                  <span class="badge ${template.publicVisible ? 'badge-ok' : ''}">
                    ${template.publicVisible ? 'Виден' : 'Черновик'}
                  </span>
                </td>
                <td>
                  <div class="row-start">
                    <button class="${state.selectedTemplateId === template.id ? 'btn' : 'btn-light'}" type="button" onclick="loadVersions(${template.id})">Версии</button>
                    <button class="btn-light" type="button" onclick="editTemplate(${template.id})">Изменить</button>
                    <button class="btn-danger" type="button" onclick="deleteTemplate(${template.id})">Удалить</button>
                  </div>
                </td>
              </tr>
            `).join('')}
          </tbody>
        </table>`;
    }

    function renderVersions() {
      el('versionCount').textContent = state.versions.length;
      if (!state.selectedTemplateId) {
        el('versionList').className = 'empty';
        el('versionList').innerHTML = 'Версии не выбраны.';
        return;
      }
      if (!state.versions.length) {
        el('versionList').className = 'empty';
        el('versionList').innerHTML = 'У этого шаблона пока нет версий.';
        return;
      }

      el('versionList').className = '';
      el('versionList').innerHTML = `
        <table>
          <thead>
            <tr>
              <th>Версия</th>
              <th>Описание</th>
              <th>Статус</th>
              <th></th>
            </tr>
          </thead>
          <tbody>
            ${state.versions.map(version => `
              <tr>
                <td><b>v${version.versionNumber}</b> ${html(version.title)}</td>
                <td>
                  <div>${html(version.description || '')}</div>
                  <div class="muted">${html(version.changeNotes || '')}</div>
                </td>
                <td>
                  <span class="badge ${version.published ? 'badge-ok' : ''}">
                    ${version.published ? 'Опубликована' : 'Черновик'}
                  </span>
                </td>
                <td>
                  <div class="row-start">
                    <button class="btn-light" type="button" onclick="editVersion(${version.id})">Изменить</button>
                    ${version.published
                      ? `<button class="btn-secondary" type="button" onclick="unpublishVersion(${version.id})">Снять с публикации</button>`
                      : `<button class="btn" type="button" onclick="publishVersion(${version.id})">Опубликовать</button>`}
                    <a class="button-link btn-light" href="${buildLecturesHref(version.id)}">Лекции</a>
                  </div>
                </td>
              </tr>
            `).join('')}
          </tbody>
        </table>`;
    }

    async function saveTemplate() {
      const subjectId = selectedSubjectId();
      const name = el('templateName').value.trim();
      if (!subjectId || !name) {
        showMessage('error', 'Заполните название шаблона и выберите предмет.');
        return;
      }

      const button = el('saveTemplateBtn');
      setLoading(button, true);
      try {
        const body = {
          subjectId,
          authorPersonId: state.user.personId,
          name,
          publicVisible: el('templatePublic').checked
        };
        if (state.editingTemplateId) {
          const current = state.templates.find(item => item.id === state.editingTemplateId);
          body.authorPersonId = current?.authorPersonId || state.user.personId;
          await api(`/courses/templates/${encodeURIComponent(state.editingTemplateId)}`, {
            method: 'PUT',
            body: JSON.stringify(body)
          });
          showMessage('success', 'Шаблон обновлен.');
        } else {
          await api('/courses/templates', {
            method: 'POST',
            body: JSON.stringify(body)
          });
          showMessage('success', 'Шаблон создан.');
        }
        await loadTemplates();
      } catch (error) {
        showMessage('error', html(error.message));
      } finally {
        setLoading(button, false);
      }
    }

    function editTemplate(id) {
      const template = state.templates.find(item => item.id === id);
      if (!template) {
        return;
      }
      state.editingTemplateId = id;
      el('templateFormTitle').textContent = 'Редактирование шаблона';
      el('templateName').value = template.name || '';
      el('templatePublic').checked = !!template.publicVisible;
      el('cancelTemplateBtn').classList.remove('hidden');
    }

    async function deleteTemplate(id) {
      const template = state.templates.find(item => item.id === id);
      if (!template || !confirm(`Удалить шаблон "${template.name}"?`)) {
        return;
      }
      try {
        await api(`/courses/templates/${encodeURIComponent(id)}`, { method: 'DELETE' });
        showMessage('success', 'Шаблон удален.');
        await loadTemplates();
      } catch (error) {
        showMessage('error', html(error.message));
      }
    }

    async function saveVersion() {
      if (!state.selectedTemplateId) {
        showMessage('error', 'Выберите шаблон курса.');
        return;
      }
      const title = el('versionTitle').value.trim();
      if (!title) {
        showMessage('error', 'Заполните название версии.');
        return;
      }

      const button = el('saveVersionBtn');
      setLoading(button, true);
      try {
        const body = {
          versionNumber: Number(el('versionNumber').value) || 1,
          title,
          description: el('versionDescription').value.trim() || null,
          createdByPersonId: state.user.personId,
          changeNotes: el('versionNotes').value.trim() || null
        };

        if (state.editingVersionId) {
          await api(`/courses/versions/${encodeURIComponent(state.editingVersionId)}`, {
            method: 'PUT',
            body: JSON.stringify(body)
          });
          showMessage('success', 'Версия обновлена.');
        } else {
          const published = el('versionPublished').checked;
          await api(`/courses/templates/${encodeURIComponent(state.selectedTemplateId)}/versions`, {
            method: 'POST',
            body: JSON.stringify({
              ...body,
              published,
              publishedByPersonId: published ? state.user.personId : null
            })
          });
          showMessage('success', 'Версия создана.');
        }

        await loadVersions(state.selectedTemplateId);
      } catch (error) {
        showMessage('error', html(error.message));
      } finally {
        setLoading(button, false);
      }
    }

    function editVersion(id) {
      const version = state.versions.find(item => item.id === id);
      if (!version) {
        return;
      }
      state.editingVersionId = id;
      el('versionFormTitle').textContent = 'Редактирование версии';
      el('versionNumber').value = version.versionNumber;
      el('versionTitle').value = version.title || '';
      el('versionDescription').value = version.description || '';
      el('versionNotes').value = version.changeNotes || '';
      el('versionPublishedLabel').classList.add('hidden');
      el('cancelVersionBtn').classList.remove('hidden');
      el('saveVersionBtn').disabled = false;
    }

    async function publishVersion(id) {
      try {
        await api(`/courses/versions/${encodeURIComponent(id)}/publish`, {
          method: 'PUT',
          body: JSON.stringify({ publishedByPersonId: state.user.personId })
        });
        showMessage('success', 'Версия опубликована.');
        await loadVersions(state.selectedTemplateId);
      } catch (error) {
        showMessage('error', html(error.message));
      }
    }

    async function unpublishVersion(id) {
      try {
        await api(`/courses/versions/${encodeURIComponent(id)}/unpublish`, { method: 'PUT' });
        showMessage('success', 'Публикация версии снята.');
        await loadVersions(state.selectedTemplateId);
      } catch (error) {
        showMessage('error', html(error.message));
      }
    }

    function prepareVersionDefaults() {
      const template = state.templates.find(item => item.id === state.selectedTemplateId);
      const maxVersion = state.versions.reduce((max, version) => Math.max(max, version.versionNumber || 0), 0);
      el('versionNumber').value = String(maxVersion + 1);
      el('versionTitle').value = template ? template.name : '';
      el('saveVersionBtn').disabled = false;
    }

    function resetTemplateSelection() {
      state.selectedTemplateId = null;
      state.versions = [];
      clearVersionForm();
      renderVersions();
    }

    function clearTemplateForm() {
      state.editingTemplateId = null;
      el('templateFormTitle').textContent = 'Новый шаблон';
      el('templateName').value = '';
      el('templatePublic').checked = true;
      el('cancelTemplateBtn').classList.add('hidden');
    }

    function clearVersionForm() {
      state.editingVersionId = null;
      el('versionFormTitle').textContent = 'Новая версия';
      el('versionNumber').value = '1';
      el('versionTitle').value = '';
      el('versionDescription').value = '';
      el('versionNotes').value = '';
      el('versionPublished').checked = false;
      el('versionPublishedLabel').classList.remove('hidden');
      el('cancelVersionBtn').classList.add('hidden');
      el('saveVersionBtn').disabled = !state.selectedTemplateId;
    }

    el('subjectSelect').addEventListener('change', () => loadTemplates().catch(error => showMessage('error', html(error.message))));
    el('saveTemplateBtn').addEventListener('click', saveTemplate);
    el('cancelTemplateBtn').addEventListener('click', clearTemplateForm);
    el('saveVersionBtn').addEventListener('click', saveVersion);
    el('cancelVersionBtn').addEventListener('click', () => {
      clearVersionForm();
      prepareVersionDefaults();
    });

    updateContextLinks();

    if (StudentTestingApi.requireAuth()) {
      loadTeacherSubjects().catch(error => {
        el('subjectSelect').innerHTML = '<option value="">Предмет недоступен</option>';
        showMessage('error', html(error.message));
      });
    }
</script>
</body>
</html>
