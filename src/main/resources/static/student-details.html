<!doctype html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Данные студента</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="/css/app.css">
</head>
<body>
<header class="app-topbar">
    <div class="app-topbar__inner">
        <a class="app-brand" href="/main.html">Student Testing</a>
        <div class="top-actions">
            <a id="backTop" href="/students.html" class="btn btn-light">К списку студентов</a>
            <button id="logoutBtn" type="button" class="btn-light">Выйти</button>
        </div>
    </div>
</header>

<main class="page page-narrow">
    <div id="errorBox" class="alert alert-error hidden"></div>

    <section id="studentBox" class="panel hidden">
        <div class="page-header">
            <div>
                <h1 class="page-title">Данные студента</h1>
                <p class="page-subtitle">Просмотрите карточку студента, его контактные данные и привязку к выбранной группе.</p>
            </div>
        </div>

        <dl class="data-list">
            <dt>ID</dt><dd id="studentId">-</dd>
            <dt>Имя</dt><dd id="studentName">-</dd>
            <dt>Email</dt><dd id="studentEmail">-</dd>
            <dt>Телефон</dt><dd id="studentPhone">-</dd>
            <dt>Группа</dt><dd id="studentGroup">-</dd>
            <dt>Membership</dt><dd id="membershipId">-</dd>
        </dl>
        <div class="actions actions-large">
            <a id="backBottom" class="btn btn-primary" href="/students.html">Вернуться к списку студентов</a>
            <a id="manageLink" class="btn" href="/kubstuTest/manage-students">Расширенное управление</a>
        </div>
    </section>
</main>

<script src="/js/api.js"></script>
<script>
    const api = StudentTestingApi.apiFetch;
    const STUDENT_ROLE = 1;

    const el = id => document.getElementById(id);

    function personName(person) {
      const fullName = [person.lastName, person.firstName].filter(Boolean).join(' ').trim();
      return fullName || person.email || `Person #${person.id}`;
    }

    function showError(message) {
      el('errorBox').textContent = message || '';
      el('errorBox').classList.toggle('hidden', !message);
    }

    async function init() {
      await StudentTestingApi.loadCurrentUser();
      document.getElementById('logoutBtn').addEventListener('click', StudentTestingApi.logout);

      const groupId = StudentTestingApi.getQueryParam('groupId');
      const studentId = StudentTestingApi.getQueryParam('studentId');
      const backHref = groupId ? `/students.html?groupId=${encodeURIComponent(groupId)}` : '/students.html';
      el('backTop').href = backHref;
      el('backBottom').href = backHref;
      el('manageLink').href = groupId
        ? `/kubstuTest/manage-students?groupId=${encodeURIComponent(groupId)}`
        : '/kubstuTest/manage-students';

      if (!groupId || !studentId) {
        throw new Error('Не указаны параметры groupId и studentId.');
      }

      const [person, group, memberships] = await Promise.all([
        api(`/users/people/${encodeURIComponent(studentId)}`),
        api(`/groups/${encodeURIComponent(groupId)}`),
        api(`/memberships/groups?groupId=${encodeURIComponent(groupId)}&personId=${encodeURIComponent(studentId)}&activeOnly=true`)
      ]);

      const membership = memberships.find(item => Number(item.role) === STUDENT_ROLE);
      if (!membership) {
        throw new Error('Для указанного студента не найдена активная запись membership в выбранной группе.');
      }

      el('studentId').textContent = person.id ?? '-';
      el('studentName').textContent = personName(person);
      el('studentEmail').textContent = person.email || '-';
      el('studentPhone').textContent = person.phone || '-';
      el('studentGroup').textContent = group.name || group.code || `Группа #${group.id}`;
      el('membershipId').textContent = `#${membership.id}`;
      el('studentBox').classList.remove('hidden');
    }

    if (StudentTestingApi.requireAuth()) {
      init().catch(error => showError(error.message || 'Не удалось загрузить данные студента.'));
    }
</script>
</body>
</html>
