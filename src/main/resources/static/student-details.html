<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Детали студента</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link
            rel="stylesheet"
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand" href="/main.html">Student Testing</a>
        <div class="d-flex gap-2">
            <a id="backToStudentsTop" class="btn btn-outline-light btn-sm" href="/students.html">К списку</a>
            <button id="logoutBtn" type="button" class="btn btn-light btn-sm">Выйти</button>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <div id="errorBox" class="alert alert-danger d-none"></div>

    <div class="card shadow-sm">
        <div class="card-body">
            <h1 class="h3 mb-4">Детали студента</h1>

            <div id="studentBox" class="d-none">
                <p><strong>ID:</strong> <span id="studentId">—</span></p>
                <p><strong>Имя:</strong> <span id="studentName">—</span></p>
                <p><strong>Логин:</strong> <span id="studentLogin">—</span></p>
                <p><strong>Телефон:</strong> <span id="studentPhone">—</span></p>
                <p><strong>Группа:</strong> <span id="studentGroup">—</span></p>
            </div>

            <div class="mt-4">
                <a id="backToStudentsBottom" class="btn btn-primary" href="/students.html">Назад к списку студентов</a>
            </div>
        </div>
    </div>
</div>

<script src="/js/api.js"></script>
<script>
    document.addEventListener("DOMContentLoaded", async () => {
        if (!StudentTestingApi.requireAuth()) {
            return;
        }

        document.getElementById("logoutBtn").addEventListener("click", StudentTestingApi.logout);

        const errorBox = document.getElementById("errorBox");
        const studentBox = document.getElementById("studentBox");

        const groupId = StudentTestingApi.getQueryParam("groupId");
        const studentId = StudentTestingApi.getQueryParam("studentId");

        const backHref = groupId
            ? `/students.html?groupId=${encodeURIComponent(groupId)}`
            : "/students.html";

        document.getElementById("backToStudentsTop").href = backHref;
        document.getElementById("backToStudentsBottom").href = backHref;

        if (!groupId || !studentId) {
            errorBox.textContent = "Не заданы groupId или studentId";
            errorBox.classList.remove("d-none");
            return;
        }

        try {
            const students = await StudentTestingApi.apiFetch(`/group-students/${groupId}`);
            const student = Array.isArray(students)
                ? students.find(item => String(item.id) === String(studentId))
                : null;

            if (!student) {
                throw new Error("Студент не найден в указанной группе");
            }

            document.getElementById("studentId").textContent = student.id ?? "—";
            document.getElementById("studentName").textContent = StudentTestingApi.studentDisplayName(student);
            document.getElementById("studentLogin").textContent = student.login ?? student.user?.login ?? "—";
            document.getElementById("studentPhone").textContent = student.phoneNumber ?? student.user?.phoneNumber ?? "—";
            document.getElementById("studentGroup").textContent = groupId;

            studentBox.classList.remove("d-none");
        } catch (error) {
            errorBox.textContent = error.message || "Не удалось загрузить данные студента";
            errorBox.classList.remove("d-none");
        }
    });
</script>
</body>
</html>
